name: Generate Contribution Animations

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # 1. Generate Snake
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # 2. Fix ampersand di SVG snake
      - name: Fix SVG entities (snake)
        run: |
          python3 - <<'PYEOF'
          import re, os
          def fix_svg(path):
              if not os.path.exists(path): return
              with open(path, 'r', encoding='utf-8') as f: content = f.read()
              fixed = re.sub(r'&(?!(amp|lt|gt|quot|apos|#\d+|#x[0-9a-fA-F]+);)', '&amp;', content)
              with open(path, 'w', encoding='utf-8') as f: f.write(fixed)
              print(f"Fixed: {path}")
          fix_svg('dist/github-contribution-grid-snake.svg')
          fix_svg('dist/github-contribution-grid-snake-dark.svg')
          PYEOF

      # 3. Generate Pac-Man
      - name: Generate Pac-Man SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # 4. Push semua ke branch output sekaligus
      - name: Push all SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}