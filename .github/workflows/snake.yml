name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Fix unescaped & in SVG
        run: |
          python3 - <<'PYEOF'
          import re, os

          def fix_svg(path):
              if not os.path.exists(path):
                  return
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              # Escape bare & yang bukan bagian dari entity (&amp; &lt; dll)
              fixed = re.sub(r'&(?!amp;|lt;|gt;|quot;|apos;|#)', '&amp;', content)
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(fixed)
              print(f"Fixed: {path}")

          fix_svg('dist/github-contribution-grid-snake.svg')
          fix_svg('dist/github-contribution-grid-snake-dark.svg')
          PYEOF

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}